name: Update 7-ELEVEN Stores

on:
  schedule:
    # 14:00 Asia/Taipei = 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest store data
        run: |
          mkdir -p public
          curl --fail --location --silent --show-error \
            "https://raw.githubusercontent.com/Cojad/taiwan-7Eleven-store/master/stores.json" \
            --output public/stores.json.tmp

      - name: Validate JSON
        run: node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('public/stores.json.tmp','utf8'));"

      - name: Replace store data
        run: mv public/stores.json.tmp public/stores.json

      - name: Commit changes
        run: |
          if git diff --quiet -- public/stores.json; then
            echo "No store data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/stores.json
          git commit -m "Update 7-ELEVEN store data"
          git push
