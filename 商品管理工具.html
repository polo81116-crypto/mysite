<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品管理工具</title>
    <style>
      :root { color: #261d14; background: #f7f1e8; font-family: "Microsoft JhengHei", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      header { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #dccbb2; background: #fffaf3; padding: 16px 20px; }
      h1, h2, h3, p { margin: 0; }
      button, input, select, textarea { font: inherit; }
      button { border: 0; border-radius: 8px; background: #2a1a10; color: #fff; cursor: pointer; font-weight: 800; padding: 10px 14px; }
      button.secondary { border: 1px solid #cdb99e; background: #fff; color: #2a1a10; }
      button.danger { background: #9d2c1f; }
      button.small { padding: 6px 8px; font-size: 12px; }
      main { display: grid; grid-template-columns: 300px minmax(420px, 1fr) 340px; gap: 14px; padding: 14px; }
      .panel { border: 1px solid #dccbb2; border-radius: 10px; background: #fffaf3; padding: 14px; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .hint { color: #6c5947; font-size: 13px; line-height: 1.7; margin-top: 8px; }
      .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      label { display: block; font-size: 13px; font-weight: 800; }
      input, select, textarea { width: 100%; border: 2px solid #cdb99e; border-radius: 8px; background: #fff; margin-top: 6px; padding: 10px; }
      textarea { min-height: 92px; resize: vertical; }
      .full { grid-column: 1 / -1; }
      .list { display: grid; gap: 8px; margin-top: 12px; }
      .item { border: 1px solid #dccbb2; border-radius: 8px; background: #fff; color: #261d14; padding: 10px; text-align: left; }
      .item.active-item { border-color: #8a603b; background: #efe2cf; }
      .item small { color: #6c5947; display: block; margin-top: 4px; }
      .item-actions { display: flex; gap: 6px; margin-top: 8px; }
      .badge { border-radius: 999px; display: inline-flex; font-size: 12px; font-weight: 800; margin-top: 8px; padding: 3px 8px; }
      .badge.active { background: #dff0d8; color: #29652d; }
      .badge.soldout { background: #fff0c8; color: #805200; }
      .badge.hidden { background: #e9e5df; color: #5d5349; }
      .option-row { display: grid; grid-template-columns: 1fr 110px 44px; gap: 8px; margin-top: 8px; }
      .grind-row { display: grid; grid-template-columns: 1fr 44px; gap: 8px; margin-top: 8px; }
      .option-row button, .grind-row button { margin-top: 6px; padding: 0; }
      .preview-card { overflow: hidden; border-radius: 12px; background: #2a1a10; color: #fff8ec; }
      .preview-card img { display: block; width: 100%; height: 210px; background: #fff; object-fit: contain; padding: 8px; }
      .preview-body { padding: 14px; }
      .price-row { display: flex; justify-content: space-between; gap: 10px; border-radius: 8px; background: rgb(255 255 255 / 0.08); margin-top: 8px; padding: 8px; }
      .image-list { display: grid; gap: 8px; margin-top: 10px; }
      .image-choice { border: 1px solid #dccbb2; background: #fff; color: #261d14; text-align: left; }
      @media (max-width: 1040px) { main { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>商品管理工具</h1>
      <p class="hint">開啟 `src/admin-products.json` 後即可新增、修改、上下架商品。圖片可填 `Imgea/ChatGPT Image 1.png` 這種路徑。</p>
      <div class="toolbar">
        <button id="openJson">開啟商品資料</button>
        <button id="saveJson">儲存回 JSON</button>
        <button id="downloadJson" class="secondary">下載 JSON</button>
        <button id="openImageFolder" class="secondary">選擇 Imgea 資料夾</button>
      </div>
      <p id="message" class="hint"></p>
    </header>

    <main>
      <aside class="panel">
        <h2>商品清單</h2>
        <p class="hint">商品順序會影響網頁顯示順序。</p>
        <button id="newProduct" class="secondary" style="width: 100%; margin-top: 12px">新增商品</button>
        <div id="productList" class="list"></div>
      </aside>

      <section class="panel">
        <h2 id="formTitle">商品內容</h2>
        <div class="field-grid" style="margin-top: 14px">
          <label>上下架狀態<select id="status"><option value="active">上架</option><option value="soldout">售完</option><option value="hidden">下架</option></select></label>
          <label>商品 ID<input id="id" placeholder="例如 medium-dark-1lb" /></label>
          <label>商品折扣％<input id="discountPercent" inputmode="numeric" placeholder="例如 10，未折扣填 0" /></label>
          <label>分類<input id="category" placeholder="例如 商用優選豆" /></label>
          <label>商品名稱<input id="name" placeholder="例如 中深焙推薦 一磅裝" /></label>
          <label>烘焙度<input id="roast" placeholder="例如 中深烘焙" /></label>
          <label>重量/包裝<input id="weight" placeholder="例如 一磅裝 / 454g" /></label>
          <label class="full">商品圖片<input id="image" placeholder="例如 Imgea/ChatGPT Image 1.png 或 images/medium-dark-1lb.jpg" /></label>
          <label class="full">風味描述<textarea id="taste"></textarea></label>
          <div class="full"><h3>規格與價格</h3><div id="options"></div><button id="addOption" class="secondary" style="margin-top: 10px">新增規格</button></div>
          <div class="full">
            <h3>研磨選項</h3>
            <p class="hint">可用下方選單快速加入目前網站常用的研磨方式；濾掛或不需研磨的商品可以留空。</p>
            <div class="toolbar">
              <select id="grindPreset" style="max-width: 340px"></select>
              <button id="addPresetGrind" class="secondary">加入選單研磨方式</button>
              <button id="addGrind" class="secondary">新增空白研磨方式</button>
            </div>
            <div id="grinds"></div>
          </div>
        </div>
        <div class="toolbar">
          <button id="applyProduct">套用到商品清單</button>
          <button id="duplicateProduct" class="secondary">複製商品</button>
          <button id="deleteProduct" class="danger">刪除商品</button>
        </div>
      </section>

      <aside class="panel">
        <h2>預覽</h2>
        <div class="preview-card" style="margin-top: 12px">
          <img id="previewImage" alt="商品預覽" />
          <div class="preview-body">
            <p id="previewCategory" class="hint" style="color: #f3c178"></p>
            <h3 id="previewName"></h3>
            <p id="previewTaste" class="hint" style="color: #dcc7ad"></p>
            <div id="previewOptions"></div>
          </div>
        </div>
        <h2 style="margin-top: 18px">Imgea 圖片</h2>
        <p class="hint">點選圖片路徑即可套用。若新增圖片後沒出現，按「選擇 Imgea 資料夾」。</p>
        <div id="imageList" class="image-list"></div>
      </aside>
    </main>

    <script>
      const defaultData = { products: [] };
      const defaultImageChoices = ["Imgea/ChatGPT Image 1.png", "Imgea/ChatGPT2.jpg", "Imgea/ChatGPT3.jpg", "images/medium-dark-1lb.jpg", "images/medium-dark-half-lb.jpg"];
      const grindPresets = [
        "咖啡原豆",
        "一磅（咖啡原豆）",
        "半磅（咖啡原豆）",
        "一磅(咖啡原豆)",
        "半磅(咖啡原豆)",
        "2.5 磨粉 / 義式",
        "3 磨粉 / 摩卡壺",
        "8 磨粉 / 手沖（推薦）",
        "8 磨粉 / 手沖",
        "9 磨粉 / 法壓",
      ];
      let fileHandle = null;
      let data = structuredClone(defaultData);
      let selectedIndex = -1;
      let imageChoices = [...defaultImageChoices];

      const $ = (selector) => document.querySelector(selector);
      const els = {
        openJson: $("#openJson"), saveJson: $("#saveJson"), downloadJson: $("#downloadJson"), openImageFolder: $("#openImageFolder"),
        message: $("#message"), productList: $("#productList"), newProduct: $("#newProduct"), formTitle: $("#formTitle"),
        id: $("#id"), status: $("#status"), discountPercent: $("#discountPercent"), category: $("#category"), name: $("#name"), roast: $("#roast"), weight: $("#weight"), image: $("#image"), taste: $("#taste"),
        options: $("#options"), addOption: $("#addOption"), grinds: $("#grinds"), addGrind: $("#addGrind"), grindPreset: $("#grindPreset"), addPresetGrind: $("#addPresetGrind"),
        applyProduct: $("#applyProduct"), duplicateProduct: $("#duplicateProduct"), deleteProduct: $("#deleteProduct"),
        previewImage: $("#previewImage"), previewCategory: $("#previewCategory"), previewName: $("#previewName"), previewTaste: $("#previewTaste"), previewOptions: $("#previewOptions"), imageList: $("#imageList"),
      };

      function setMessage(text) { els.message.textContent = text; }
      function blankProduct() { return { id: `product-${Date.now()}`, status: "active", discountPercent: 0, category: "", name: "", roast: "", taste: "", packageOptions: [{ label: "單包", price: 0 }], grindOptions: [], weight: "", image: "Imgea/ChatGPT Image 1.png" }; }
      function statusText(status) { return { active: "上架", soldout: "售完", hidden: "下架" }[status] || status; }
      function normalizeData(input) { return { products: Array.isArray(input.products) ? input.products : [] }; }

      function renderList() {
        els.productList.innerHTML = "";
        data.products.forEach((product, index) => {
          const item = document.createElement("div");
          item.className = `item${index === selectedIndex ? " active-item" : ""}`;
          item.innerHTML = `
            <button type="button" class="secondary" data-select="${index}" style="width: 100%; text-align: left">
              <strong>${product.name || "未命名商品"}</strong>
              <small>${product.category || "未分類"}｜${product.packageOptions?.length || 0} 個規格</small>
              <span class="badge ${product.status || "active"}">${statusText(product.status || "active")}</span>
            </button>
            <div class="item-actions">
              <button type="button" class="secondary small" data-move-up="${index}" ${index === 0 ? "disabled" : ""}>上移</button>
              <button type="button" class="secondary small" data-move-down="${index}" ${index === data.products.length - 1 ? "disabled" : ""}>下移</button>
            </div>
          `;
          els.productList.append(item);
        });
      }

      function moveProduct(fromIndex, toIndex) {
        if (fromIndex < 0 || toIndex < 0 || fromIndex >= data.products.length || toIndex >= data.products.length) return;
        const [item] = data.products.splice(fromIndex, 1);
        data.products.splice(toIndex, 0, item);
        selectedIndex = toIndex;
        renderList();
        fillForm(data.products[selectedIndex]);
        setMessage("已調整商品順序，記得儲存回 JSON。");
      }

      function renderOptions(options = []) {
        els.options.innerHTML = "";
        options.forEach((option, index) => {
          const row = document.createElement("div");
          row.className = "option-row";
          row.innerHTML = `<input data-option-label value="${option.label || ""}" placeholder="規格，例如 100g / 一磅" /><input data-option-price value="${Number(option.price) || 0}" inputmode="numeric" placeholder="價格" /><button type="button" class="danger" data-remove-option="${index}">×</button>`;
          els.options.append(row);
        });
      }

      function renderGrinds(grinds = []) {
        els.grinds.innerHTML = "";
        grinds.forEach((grind, index) => {
          const row = document.createElement("div");
          row.className = "grind-row";
          row.innerHTML = `<input data-grind value="${grind || ""}" placeholder="例如 咖啡原豆 / 手沖" /><button type="button" class="danger" data-remove-grind="${index}">×</button>`;
          els.grinds.append(row);
        });
      }

      function readForm() {
        const packageOptions = [...els.options.querySelectorAll(".option-row")].map((row) => ({ label: row.querySelector("[data-option-label]").value.trim(), price: Number(row.querySelector("[data-option-price]").value) || 0 })).filter((option) => option.label);
        const grindOptions = [...els.grinds.querySelectorAll("[data-grind]")].map((input) => input.value.trim()).filter(Boolean);
        const discountPercent = Math.min(100, Math.max(0, Number(els.discountPercent.value) || 0));
        return { id: els.id.value.trim(), status: els.status.value, discountPercent, category: els.category.value.trim(), name: els.name.value.trim(), roast: els.roast.value.trim(), taste: els.taste.value.trim(), packageOptions: packageOptions.length ? packageOptions : [{ label: "單包", price: 0 }], grindOptions, weight: els.weight.value.trim(), image: els.image.value.trim() };
      }

      function fillForm(product) {
        els.formTitle.textContent = product.name || "商品內容";
        els.id.value = product.id || ""; els.status.value = product.status || "active"; els.discountPercent.value = Number(product.discountPercent) || 0; els.category.value = product.category || ""; els.name.value = product.name || ""; els.roast.value = product.roast || ""; els.weight.value = product.weight || ""; els.image.value = product.image || ""; els.taste.value = product.taste || "";
        renderOptions(product.packageOptions || []); renderGrinds(product.grindOptions || []); renderPreview();
      }

      function renderPreview() {
        const product = readForm();
        els.previewImage.src = product.image || "";
        els.previewCategory.textContent = `${product.category || "未分類"}｜${product.roast || "未填烘焙度"}｜${product.weight || "未填重量"}`;
        els.previewName.textContent = product.name || "未命名商品";
        els.previewTaste.textContent = product.taste || "尚未填寫風味描述。";
        els.previewOptions.innerHTML = "";
        product.packageOptions.forEach((option) => {
          const row = document.createElement("div");
          row.className = "price-row";
          const discount = Number(product.discountPercent) || 0;
          const finalPrice = discount > 0 ? Math.round(option.price * (100 - discount) / 100) : option.price;
          row.innerHTML = `<span>${option.label}</span><strong>${discount > 0 ? `$${option.price} -> $${finalPrice}` : `$${option.price}`}</strong>`;
          els.previewOptions.append(row);
        });
      }

      function selectProduct(index) { selectedIndex = index; fillForm(data.products[index]); renderList(); setMessage(""); }

      function applyProduct() {
        const product = readForm();
        if (!product.id || !product.name) { setMessage("商品 ID 和商品名稱必填。"); return false; }
        if (data.products.findIndex((item, index) => item.id === product.id && index !== selectedIndex) !== -1) { setMessage("商品 ID 不可重複。"); return false; }
        if (selectedIndex === -1) { data.products.push(product); selectedIndex = data.products.length - 1; } else { data.products[selectedIndex] = product; }
        renderList(); fillForm(product); setMessage("已套用到商品清單，記得儲存回 JSON。"); return true;
      }

      function renderImageChoices() {
        els.imageList.innerHTML = "";
        [...new Set(imageChoices)].forEach((path) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "image-choice";
          button.textContent = path;
          button.addEventListener("click", () => { els.image.value = path; renderPreview(); });
          els.imageList.append(button);
        });
      }

      function renderGrindPresets() {
        els.grindPreset.innerHTML = "";
        grindPresets.forEach((preset) => {
          const option = document.createElement("option");
          option.value = preset;
          option.textContent = preset;
          els.grindPreset.append(option);
        });
      }

      async function loadBundledProducts() {
        try {
          const response = await fetch("src/admin-products.json", { cache: "no-store" });
          if (!response.ok) throw new Error("Cannot load bundled products.");
          data = normalizeData(await response.json());
          selectedIndex = data.products.length ? 0 : -1;
          renderList();
          fillForm(selectedIndex >= 0 ? data.products[selectedIndex] : blankProduct());
          setMessage("已載入目前商品。若要直接儲存回原檔，請按「開啟商品資料」並選 src/admin-products.json。");
        } catch {
          fillForm(blankProduct());
          setMessage("若左側沒有商品，請按「開啟商品資料」選擇 src/admin-products.json。");
        }
      }

      async function openJson() {
        if (!window.showOpenFilePicker) { setMessage("請用新版 Chrome 或 Edge 開啟，才可直接讀寫檔案。"); return; }
        [fileHandle] = await window.showOpenFilePicker({ types: [{ description: "商品 JSON", accept: { "application/json": [".json"] } }] });
        const file = await fileHandle.getFile();
        data = normalizeData(JSON.parse(await file.text()));
        selectedIndex = data.products.length ? 0 : -1;
        renderList(); fillForm(selectedIndex >= 0 ? data.products[selectedIndex] : blankProduct()); setMessage(`已開啟 ${file.name}`);
      }

      async function saveJson() {
        if (!applyProduct()) return;
        const text = `${JSON.stringify(data, null, 2)}\n`;
        if (fileHandle?.createWritable) {
          const writable = await fileHandle.createWritable();
          await writable.write(text);
          await writable.close();
          setMessage("已儲存回 JSON。更新網站時請 commit 並 push 到 GitHub。");
          return;
        }
        downloadJson();
      }

      function downloadJson() {
        if (!applyProduct()) return;
        const blob = new Blob([`${JSON.stringify(data, null, 2)}\n`], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = "admin-products.json"; link.click(); URL.revokeObjectURL(url);
        setMessage("已下載 admin-products.json，請覆蓋 src/admin-products.json。");
      }

      async function openImageFolder() {
        if (!window.showDirectoryPicker) { setMessage("請用新版 Chrome 或 Edge 開啟，才可選擇資料夾。"); return; }
        const dir = await window.showDirectoryPicker();
        const paths = [];
        for await (const [name, handle] of dir.entries()) {
          if (handle.kind === "file" && /\.(png|jpe?g|webp|gif)$/i.test(name)) paths.push(`Imgea/${name}`);
        }
        imageChoices = [...paths, ...defaultImageChoices]; renderImageChoices(); setMessage(`已讀取 ${paths.length} 張 Imgea 圖片。`);
      }

      els.openJson.addEventListener("click", openJson);
      els.saveJson.addEventListener("click", saveJson);
      els.downloadJson.addEventListener("click", downloadJson);
      els.openImageFolder.addEventListener("click", openImageFolder);
      els.newProduct.addEventListener("click", () => { selectedIndex = -1; fillForm(blankProduct()); renderList(); });
      els.applyProduct.addEventListener("click", applyProduct);
      els.duplicateProduct.addEventListener("click", () => {
        const source = readForm();
        if (!source.id || !source.name) {
          setMessage("請先選擇或填好一個商品再複製。");
          return;
        }
        let nextId = `${source.id}-copy`;
        let count = 2;
        while (data.products.some((product) => product.id === nextId)) {
          nextId = `${source.id}-copy-${count}`;
          count += 1;
        }
        const copy = {
          ...source,
          id: nextId,
          status: "hidden",
          name: `${source.name} 複製`,
          packageOptions: source.packageOptions.map((option) => ({ ...option })),
          grindOptions: [...source.grindOptions],
        };
        data.products.push(copy);
        selectedIndex = data.products.length - 1;
        renderList();
        fillForm(copy);
        setMessage("已複製成新商品，預設為下架。修改完成後可改成上架並儲存。");
      });
      els.deleteProduct.addEventListener("click", () => { if (selectedIndex === -1) return; if (!confirm("確定刪除這個商品？")) return; data.products.splice(selectedIndex, 1); selectedIndex = data.products.length ? Math.min(selectedIndex, data.products.length - 1) : -1; renderList(); fillForm(selectedIndex >= 0 ? data.products[selectedIndex] : blankProduct()); setMessage("已刪除商品，記得儲存回 JSON。"); });
      els.productList.addEventListener("click", (event) => {
        const selectIndex = event.target.closest("[data-select]")?.dataset.select;
        const moveUpIndex = event.target.closest("[data-move-up]")?.dataset.moveUp;
        const moveDownIndex = event.target.closest("[data-move-down]")?.dataset.moveDown;
        if (selectIndex !== undefined) selectProduct(Number(selectIndex));
        if (moveUpIndex !== undefined) moveProduct(Number(moveUpIndex), Number(moveUpIndex) - 1);
        if (moveDownIndex !== undefined) moveProduct(Number(moveDownIndex), Number(moveDownIndex) + 1);
      });
      els.addOption.addEventListener("click", () => { const product = readForm(); product.packageOptions.push({ label: "", price: 0 }); renderOptions(product.packageOptions); });
      els.addGrind.addEventListener("click", () => { const product = readForm(); product.grindOptions.push(""); renderGrinds(product.grindOptions); });
      els.addPresetGrind.addEventListener("click", () => {
        const product = readForm();
        const preset = els.grindPreset.value;
        if (preset && !product.grindOptions.includes(preset)) product.grindOptions.push(preset);
        renderGrinds(product.grindOptions);
      });
      els.options.addEventListener("click", (event) => { const index = event.target.dataset.removeOption; if (index === undefined) return; const product = readForm(); product.packageOptions.splice(Number(index), 1); renderOptions(product.packageOptions); renderPreview(); });
      els.grinds.addEventListener("click", (event) => { const index = event.target.dataset.removeGrind; if (index === undefined) return; const product = readForm(); product.grindOptions.splice(Number(index), 1); renderGrinds(product.grindOptions); });
      document.addEventListener("input", (event) => { if (event.target.closest("main")) renderPreview(); });

      renderImageChoices();
      renderGrindPresets();
      loadBundledProducts();
    </script>
  </body>
</html>
